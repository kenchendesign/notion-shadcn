<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notion Theme for shadcn</title>
    <link rel="stylesheet" href="./theme.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div>
          <h1>Notion Theme for shadcn</h1>
          <p>A warm, minimal shadcn theme inspired by Notion.</p>
        </div>
        <div class="actions">
          <button id="toggle-mode">Toggle dark mode</button>
          <button id="copy-theme">Copy theme.css</button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="sidebar-section">
            <div class="sidebar-title">Workspace</div>
            <button class="nav-item active">Home</button>
            <button class="nav-item">Docs</button>
            <button class="nav-item">Tasks</button>
            <button class="nav-item">Settings</button>
          </div>
        </aside>

        <section class="content">
          <div class="card hero">
            <span class="badge">shadcn</span>
            <h2>Notion-style theme preview</h2>
            <p>
              Soft canvas, subtle borders, muted surfaces, and restrained contrast.
            </p>
            <div class="button-row">
              <button class="primary">Primary button</button>
              <button class="secondary">Secondary</button>
            </div>
          </div>

          <div class="grid">
            <div class="card">
              <h3>Inputs</h3>
              <input class="input" placeholder="Search or type..." />
            </div>

            <div class="card">
              <h3>Status</h3>
              <div class="row">
                <span class="badge muted">Draft</span>
                <span class="badge">Published</span>
              </div>
            </div>

            <div class="card">
              <h3>Table</h3>
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Role</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>Ken</td>
                    <td>Designer</td>
                  </tr>
                  <tr>
                    <td>Ada</td>
                    <td>Engineer</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="card">
              <h3>Theme CSS</h3>
              <pre id="theme-output"></pre>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
